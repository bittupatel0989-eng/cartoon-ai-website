<!DOCTYPE html>
<html>
<head>
    <title>AI Cartoon Photo Maker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial;
            text-align: center;
            padding: 20px;
            background: #f2f2f2;
        }
        img{
            max-width: 90%;
            margin-top: 20px;
            border-radius: 10px;
        }
        input, button{
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
        }
        button{
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        button:hover{
            background-color: #45a049;
        }
    </style>
</head>
<body>

<h1>AI Cartoon Photo Maker</h1>
<p>Upload your photo and get AI cartoon!</p>

<input type="file" id="upload" accept="image/*">
<br>
<button id="cartoonBtn">Make Cartoon</button>
<br>
<img id="result" style="display:none">
<br>
<button id="downloadBtn" style="display:none">Download Cartoon</button>

<script>
const upload = document.getElementById("upload");
const cartoonBtn = document.getElementById("cartoonBtn");
const result = document.getElementById("result");
const downloadBtn = document.getElementById("downloadBtn");

let selectedFile;

upload.addEventListener("change", function(){
    selectedFile = upload.files[0];
    result.style.display = "none";
    downloadBtn.style.display = "none";
});

cartoonBtn.addEventListener("click", async function(){
    if(!selectedFile){ alert("Please upload a photo!"); return; }
    
    const formData = new FormData();
    formData.append("image", selectedFile);
    const apiKey ="54836b82-c5c6-487a-8575-b0ef50445092";

    const response = await fetch("https://api.deepai.org/api/cartoonizer", {
        method: "POST",
        headers: {
            "api-key": 54836b82-c5c6-487a-8575-b0ef50445092
        },
        body: formData
    });

    const data = await response.json();
    if(data.output_url){
        result.src = data.output_url;
        result.style.display = "block";
        downloadBtn.style.display = "inline-block";
    } else {
        alert("Error generating cartoon. Try again!");
    }
});

// Download
downloadBtn.addEventListener("click", function(){
    const a = document.createElement("a");
    a.href = result.src;
    a.download = "cartoon.png";
    a.click();
});
</script>

</body>
</html>
