<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Pro JS Cartoon AI</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body, html {
    height: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#ece9e6,#ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
}
.container {
    width: 95%;
    max-width: 950px;
    background:#fff;
    border-radius: 25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    padding: 30px;
    text-align: center;
    position: relative;
}
h1 { font-size: 32px; color:#333; margin-bottom: 10px; }
p { font-size: 18px; color:#555; margin-bottom: 25px; }
input, button, select {
    padding:12px 25px;
    font-size:16px;
    border-radius:10px;
    border:none;
    margin:10px 5px;
    transition: all 0.3s ease;
}
button { cursor:pointer; background:#4CAF50; color:white; box-shadow:0 8px 25px rgba(0,0,0,0.2);}
button:hover { background:#ff5722; transform:scale(1.05); }
canvas { margin-top: 20px; border-radius:20px; max-width:100%; box-shadow:0 10px 30px rgba(0,0,0,0.2); opacity:0; transition:opacity 0.8s ease;}
.loader {
    display:none;
    border: 6px solid #f3f3f3;
    border-top: 6px solid #4CAF50;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}
@keyframes spin { 0%{ transform: rotate(0deg);} 100%{ transform: rotate(360deg);} }
.buttons { margin-top:15px; }
#copyBtn { display:none; }
@media(max-width:768px){
    .container { padding:20px; }
    input, button, select { width:90%; }
}
</style>
</head>
<body>

<div class="container">
    <h1>Ultimate JS Cartoon AI</h1>
    <p>Upload photo → Apply Cartoon → Download / Share / Copy Link</p>
    <input type="file" id="upload" accept="image/*"><br>
    <select id="styleSelect">
        <option value="posterize">Toon</option>
        <option value="sketch">Sketch</option>
        <option value="comic">Comic</option>
    </select><br>
    <div class="buttons">
        <button id="cartoonBtn">Apply Cartoon Effect</button>
        <button id="downloadBtn" style="display:none">Download Cartoon</button>
        <button id="shareBtn" style="display:none">Share Cartoon</button>
        <button id="copyBtn">Copy Link</button>
    </div>
    <div class="loader" id="loader"></div>
    <canvas id="canvas"></canvas>
</div>

<script>
const upload = document.getElementById("upload");
const cartoonBtn = document.getElementById("cartoonBtn");
const downloadBtn = document.getElementById("downloadBtn");
const shareBtn = document.getElementById("shareBtn");
const copyBtn = document.getElementById("copyBtn");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const loader = document.getElementById("loader");
const styleSelect = document.getElementById("styleSelect");

let img = new Image();
let cartoonURL = "";

upload.addEventListener("change", ()=>{
    const file = upload.files[0];
    if(!file) return;
    img.src = URL.createObjectURL(file);
    img.onload = ()=>{
        canvas.width = Math.min(img.width, 800);
        canvas.height = img.height * (canvas.width / img.width);
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        canvas.style.opacity=0;
    }
});

cartoonBtn.addEventListener("click", ()=>{
    if(!img.src){ alert("Upload a photo first!"); return; }
    loader.style.display="block";
    canvas.style.opacity=0;
    setTimeout(()=>{
        const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
        const data = imageData.data;
        const style = styleSelect.value;
        for(let i=0;i<data.length;i+=4){
            if(style==="posterize"){ // Toon
                data[i] = Math.floor(data[i]/50)*50;
                data[i+1] = Math.floor(data[i+1]/50)*50;
                data[i+2] = Math.floor(data[i+2]/50)*50;
            } else if(style==="sketch"){ // Sketch
                let avg = (data[i]+data[i+1]+data[i+2])/3;
                data[i] = data[i+1] = data[i+2] = 255 - avg;
            } else if(style==="comic"){ // Comic
                data[i] = data[i]*1.2; data[i+1] = data[i+1]*0.8; data[i+2] = data[i+2]*1.5;
            }
        }
        ctx.putImageData(imageData,0,0);
        loader.style.display="none";
        canvas.style.opacity=1;
        downloadBtn.style.display="inline-block";
        shareBtn.style.display="inline-block";
        copyBtn.style.display="inline-block";
        cartoonURL = canvas.toDataURL("image/png");
    },500);
});

// Download
downloadBtn.addEventListener("click", ()=>{
    const link = document.createElement("a");
    link.href = cartoonURL;
    link.download="cartoon_photo.png";
    link.click();
});

// Share
shareBtn.addEventListener("click", ()=>{
    if(cartoonURL){
        if(navigator.share){
            navigator.share({title:"Check My Cartoon!", url:cartoonURL});
        } else { prompt("Copy this link:", cartoonURL); }
    }
});

// Copy link
copyBtn.addEventListener("click", ()=>{
    navigator.clipboard.writeText(cartoonURL).then(()=>{
        copyBtn.innerText="Copied!";
        setTimeout(()=>{copyBtn.innerText="Copy Link";},1500);
    });
});
</script>

</body>
</html>
