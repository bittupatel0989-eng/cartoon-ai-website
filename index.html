<!DOCTYPE html>
<html>
<head>
    <title>AI Cartoon Maker Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
            transition: background 0.5s ease;
        }
        h1 {
            font-size: 28px;
            color: #333;
            text-shadow: 1px 1px 2px #aaa;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        input, button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            background-color: #ff5722;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        img {
            max-width: 90%;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        img.show {
            opacity: 1;
        }
        .buttons {
            margin-top: 15px;
        }
        @media(min-width: 768px) {
            #preview, #cartoonResult {
                display: inline-block;
                width: 45%;
                margin: 2%;
            }
        }
    </style>
</head>
<body>

<h1>AI Cartoon Maker Ultimate</h1>
<p>Upload your photo → Generate Cartoon → Download or Share!</p>

<input type="file" id="upload" accept="image/*"><br>
<div class="buttons">
    <button id="cartoonBtn">Generate Cartoon</button>
    <button id="downloadBtn" style="display:none">Download Cartoon</button>
    <button id="shareBtn" style="display:none">Share Cartoon</button>
</div>

<br>
<img id="preview" alt="Original Photo">
<img id="cartoonResult" alt="Cartoon Preview">

<script>
const upload = document.getElementById("upload");
const cartoonBtn = document.getElementById("cartoonBtn");
const downloadBtn = document.getElementById("downloadBtn");
const shareBtn = document.getElementById("shareBtn");
const preview = document.getElementById("preview");
const cartoonResult = document.getElementById("cartoonResult");

let selectedFile;
let cartoonURL = "";

upload.addEventListener("change", () => {
    selectedFile = upload.files[0];
    preview.style.display = "none";
    cartoonResult.style.display = "none";
    downloadBtn.style.display = "none";
    shareBtn.style.display = "none";
});

cartoonBtn.addEventListener("click", async () => {
    if (!selectedFile) { alert("Select a photo first!"); return; }

    preview.src = URL.createObjectURL(selectedFile);
    preview.style.display = "block";
    preview.classList.add("show");

    const formData = new FormData();
    formData.append("image", selectedFile);

    // ✅ Paste your API key here
    const apiKey = "54836b82-c5c6-487a-8575-b0ef50445092";

    try {
        const res = await fetch("https://api.deepai.org/api/cartoonizer", {
            method: "POST",
            headers: { "api-key": apiKey },
            body: formData
        });
        const data = await res.json();
        if (data.output_url) {
            cartoonResult.src = data.output_url;
            cartoonResult.style.display = "block";
            cartoonResult.classList.add("show");
            cartoonURL = data.output_url;
            downloadBtn.style.display = "inline-block";
            shareBtn.style.display = "inline-block";
        } else { alert("Cartoon generation failed!"); }
    } catch (e) { console.error(e); alert("Error! Check API key or internet."); }
});

// Download button
downloadBtn.addEventListener("click", () => {
    if (cartoonURL) {
        const a = document.createElement("a");
        a.href = cartoonURL;
        a.download = "AI_Cartoon.png";
        a.click();
    }
});

// Share button
shareBtn.addEventListener("click", () => {
    if (cartoonURL) {
        if (navigator.share) {
            navigator.share({ title: "Check AI Cartoon!", url: cartoonURL });
        } else {
            prompt("Copy this link:", cartoonURL);
        }
    }
});
</script>

</body>
</html>
