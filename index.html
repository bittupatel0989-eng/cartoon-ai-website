<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Max Cartoon Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:0;font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#ff9a9e,#fad0c4);display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3);margin:20px 0}
.upload-container{display:flex;flex-direction:column;align-items:center;gap:15px;margin-bottom:20px;width:100%;max-width:600px}
.custom-upload,button{padding:12px 20px;font-size:16px;border-radius:12px;border:none;cursor:pointer;font-weight:600;transition:.2s}
.custom-upload{background:linear-gradient(45deg,#ff9a9e,#fad0c4);color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.custom-upload:hover,button:hover{transform:scale(1.05);box-shadow:0 6px 18px rgba(0,0,0,.35)}
input[type=file]{display:none}
#output-canvas{width:100%;max-width:800px;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
#style-options,#sub-options{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:15px}
.style-btn,.sub-btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:600;background:#fff;transition:.2s}
.style-btn:hover,.sub-btn:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.25)}
.button-container{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
body.dark-mode{background:linear-gradient(135deg,#2c3e50,#34495e)}
body.dark-mode .custom-upload,body.dark-mode button,body.dark-mode .style-btn,body.dark-mode .sub-btn{background:linear-gradient(45deg,#34495e,#2c3e50);color:#fff}
</style>
</head>
<body>
<h1>Pro Max Cartoon Generator</h1><div class="upload-container">
<label for="upload-photo" class="custom-upload">Upload Photo</label>
<input type="file" id="upload-photo" accept="image/*">
<canvas id="output-canvas"></canvas>
</div><div id="style-options"></div>
<div id="sub-options"></div><div class="button-container">
<button id="download-photo" disabled>Download</button>
<button id="dark-toggle">Dark/Light</button>
</div><script>
const canvas=document.getElementById('output-canvas');
const ctx=canvas.getContext('2d');
const uploadInput=document.getElementById('upload-photo');
const styleDiv=document.getElementById('style-options');
const subDiv=document.getElementById('sub-options');
const downloadBtn=document.getElementById('download-photo');
const darkToggle=document.getElementById('dark-toggle');

let uploadedImage=null;
let currentStyle="Normal";
let currentSub="Default";

const styles={
Normal:["Default"],
Grayscale:["Soft","Hard"],
Contrast:["Low","Medium","High"],
Sepia:["Light","Classic"],
Hue:["Red","Green","Blue"],
Saturate:["Mild","Strong","Extreme"],
Invert:["Full","Soft"],
Brightness:["Soft","Bright"],
Pixelate:["Small","Medium","Big"],
PopArt:["Classic","Neon","Dots"],
Blur:["Light","Medium","Heavy"],
Sketch:["BlackWhite","Pencil","Color"]
};

Object.keys(styles).forEach(style=>{
const btn=document.createElement('button');
btn.className="style-btn";
btn.textContent=style;
btn.disabled=true;
btn.onclick=()=>{
currentStyle=style;
createSubOptions();
applyStyle();
};
styleDiv.appendChild(btn);
});

function createSubOptions(){
subDiv.innerHTML="";
styles[currentStyle].forEach(sub=>{
const btn=document.createElement('button');
btn.className="sub-btn";
btn.textContent=sub;
btn.onclick=()=>{
currentSub=sub;
applyStyle();
};
subDiv.appendChild(btn);
});
}

uploadInput.addEventListener('change',e=>{
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=ev=>{
uploadedImage=new Image();
uploadedImage.onload=()=>{
canvas.width=Math.min(800,uploadedImage.width);
canvas.height=canvas.width*(uploadedImage.height/uploadedImage.width);

Array.from(document.querySelectorAll('.style-btn')).forEach(b=>b.disabled=false);
downloadBtn.disabled=false;

applyStyle();
};
uploadedImage.src=ev.target.result;
};
reader.readAsDataURL(file);
});

function applyStyle(){
if(!uploadedImage)return;
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.filter='none';

switch(currentStyle){

case "Grayscale":
ctx.filter=currentSub=="Hard"?'grayscale(100%)':'grayscale(60%)';
break;

case "Contrast":
ctx.filter=currentSub=="Low"?'contrast(110%)':currentSub=="Medium"?'contrast(150%)':'contrast(200%)';
break;

case "Sepia":
ctx.filter=currentSub=="Light"?'sepia(40%)':'sepia(80%)';
break;

case "Hue":
ctx.filter=currentSub=="Red"?'hue-rotate(0deg)':currentSub=="Green"?'hue-rotate(90deg)':'hue-rotate(200deg)';
break;

case "Saturate":
ctx.filter=currentSub=="Mild"?'saturate(130%)':currentSub=="Strong"?'saturate(200%)':'saturate(300%)';
break;

case "Invert":
ctx.filter=currentSub=="Soft"?'invert(50%)':'invert(100%)';
break;

case "Brightness":
ctx.filter=currentSub=="Soft"?'brightness(120%)':'brightness(160%)';
break;

case "Blur":
ctx.filter=currentSub=="Light"?'blur(2px)':currentSub=="Medium"?'blur(4px)':'blur(8px)';
break;

case "PopArt":
ctx.filter=currentSub=="Neon"?'contrast(200%) saturate(300%)':currentSub=="Dots"?'contrast(180%) saturate(220%)':'contrast(160%) saturate(200%)';
break;

case "Pixelate":
ctx.drawImage(uploadedImage,0,0,canvas.width,canvas.height);
let size=currentSub=="Small"?6:currentSub=="Medium"?10:20;
let img=ctx.getImageData(0,0,canvas.width,canvas.height);
for(let y=0;y<canvas.height;y+=size){
for(let x=0;x<canvas.width;x+=size){
let i=(y*canvas.width+x)*4;
let r=img.data[i];
let g=img.data[i+1];
let b=img.data[i+2];
for(let yy=0;yy<size;yy++){
for(let xx=0;xx<size;xx++){
let ii=((y+yy)*canvas.width+(x+xx))*4;
img.data[ii]=r;
img.data[ii+1]=g;
img.data[ii+2]=b;
}
}
}
}
ctx.putImageData(img,0,0);
return;

case "Sketch":
ctx.drawImage(uploadedImage,0,0,canvas.width,canvas.height);
let data=ctx.getImageData(0,0,canvas.width,canvas.height);
for(let i=0;i<data.data.length;i+=4){
let avg=(data.data[i]+data.data[i+1]+data.data[i+2])/3;
if(currentSub=="Color"){
data.data[i]=avg;
}else{
data.data[i]=avg;
data.data[i+1]=avg;
data.data[i+2]=avg;
}
}
ctx.putImageData(data,0,0);
ctx.filter=currentSub=="Pencil"?'contrast(200%)':'contrast(150%)';
ctx.drawImage(canvas,0,0);
return;
}

ctx.drawImage(uploadedImage,0,0,canvas.width,canvas.height);
}

downloadBtn.onclick=()=>{
const link=document.createElement('a');
link.download='cartoon.png';
link.href=canvas.toDataURL();
link.click();
};

darkToggle.onclick=()=>document.body.classList.toggle('dark-mode');

</script></body>
</html>
